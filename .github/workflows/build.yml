name: Build

# Se ejecuta al hacer push, al abrir un pull request, y tambien se puede
# lanzar a mano desde la pestana "Actions" de GitHub con el boton
# "Run workflow" (workflow_dispatch).
on:
  push:
    branches: [ "main", "master" ]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Descargar el codigo
        uses: actions/checkout@v4

      - name: Instalar Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Instalar Gradle
        # No versionamos gradlew/gradle-wrapper.jar (es un binario), asi
        # que esta accion instala Gradle directamente en el runner.
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: 7.6.4

      - name: Compilar el mod
        run: gradle build --no-daemon --stacktrace

      - name: Subir el .jar como artefacto
        uses: actions/upload-artifact@v4
        with:
          name: nanookmod
          path: build/libs/*.jar
          if-no-files-found: error
